name: Data pipeline

# Refreshes TFT stats: collect new matches → aggregate → rebuild the frontend.
# Runs on a schedule and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 6 * * *'      # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Regions (space-separated), e.g. "na1 euw1 kr". Blank = default set.'
        required: false
        default: ''
      limit:
        description: 'Max new matches per platform. Blank = TARGET_MATCHES_PER_RUN.'
        required: false
        default: ''

# Never let two pipeline runs overlap (they share one Postgres dataset).
concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL:    ${{ secrets.REDIS_URL }}
      RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
      # Platform rotation for scheduled runs. Groups are separated by '|',
      # platforms within a group by spaces. Each day collects ONE group,
      # cycling by day-of-year (resolved by scripts/select_platforms.py), so
      # every region refreshes on a 3-day cycle while each run stays well
      # under the 60-minute budget. A manual run with an explicit platforms
      # input bypasses the rotation.
      PLATFORM_ROTATION: 'na1 euw1|kr sg2|vn2 oc1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Resolve which platforms to collect (manual override, else day-of-year
      # rotation). Runs in Python, not inline bash — the '|' group separators
      # are shell metacharacters and must never reach the command line.
      - name: Select platforms
        id: select
        env:
          MANUAL_PLATFORMS: ${{ inputs.platforms }}
        run: python scripts/select_platforms.py

      - name: Collect new matches
        run: |
          LIMIT_ARG=""
          if [ -n "${{ inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi
          echo "Collecting platforms: ${{ steps.select.outputs.platforms }}  $LIMIT_ARG"
          python -m collector.main --platforms ${{ steps.select.outputs.platforms }} $LIMIT_ARG

      - name: Aggregate stats
        run: python -m aggregator.main

      # Aggregator flushes the Redis cache; now rebuild the static frontend so
      # the new data + champion icons get baked into the next deploy.
      - name: Trigger frontend rebuild
        if: success()
        run: curl -fsS -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"
