name: Data pipeline

# Refreshes TFT stats: collect new matches → aggregate → rebuild the frontend.
# Runs on a schedule and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 6 * * *'      # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Regions (space-separated), e.g. "na1 euw1 kr". Blank = default set.'
        required: false
        default: ''
      limit:
        description: 'Max new matches per platform. Blank = TARGET_MATCHES_PER_RUN.'
        required: false
        default: ''

# Never let two pipeline runs overlap (they share one Postgres dataset).
concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL:    ${{ secrets.REDIS_URL }}
      RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
      # Platform rotation for scheduled runs. Groups are separated by '|',
      # platforms within a group by spaces. Each day collects ONE group, cycling
      # by day-of-year, so every region is refreshed across the cycle without a
      # single run exceeding the 60-min budget (~10 min/platform). Trim or
      # reorder groups to taste; a manual run can override with its own input.
      # Two groups → each region refreshed every other day.
      PLATFORM_ROTATION: 'na1 euw1|kr sg2|vn2 oc1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect new matches
        run: |
          # Manual dispatch can pin platforms; otherwise rotate by day-of-year.
          PLATFORMS="${{ inputs.platforms }}"
          if [ -z "$PLATFORMS" ]; then
            IFS='|' read -ra GROUPS <<< "$PLATFORM_ROTATION"
            DOY=$(date -u +%j)                       # day of year, e.g. 173
            IDX=$(( 10#$DOY % ${#GROUPS[@]} ))        # 10# forces base-10 (avoid octal)
            PLATFORMS="${GROUPS[$IDX]}"
            echo "Rotation: day-of-year $DOY -> group $((IDX + 1))/${#GROUPS[@]}"
          fi
          LIMIT_ARG=""
          if [ -n "${{ inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi
          echo "Collecting platforms: $PLATFORMS  $LIMIT_ARG"
          python -m collector.main --platforms $PLATFORMS $LIMIT_ARG

      - name: Aggregate stats
        run: python -m aggregator.main

      # Aggregator flushes the Redis cache; now rebuild the static frontend so
      # the new data + champion icons get baked into the next deploy.
      - name: Trigger frontend rebuild
        if: success()
        run: curl -fsS -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"
